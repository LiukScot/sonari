<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-bg); font-family: var(--font-sans); }
  .wrap { padding: 26px 28px; display: flex; gap: 48px; align-items: center; flex-wrap: wrap; }
  .lockup { display: flex; align-items: center; gap: 16px; }
  .word { font-size: 40px; font-weight: 800; letter-spacing: -0.03em;
          background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .cap { font-size: 11px; color: var(--text-faint); font-weight: 700; letter-spacing: var(--track-caps); text-transform: uppercase; }
</style></head>
<body><div class="wrap">
  <div class="col">
    <div class="lockup">
      <img src="../assets/sonari-mark.svg" width="60" height="60" alt="Sonari mark" />
      <span class="word">Sonari</span>
    </div>
    <div class="cap">Primary lockup</div>
  </div>
  <div class="col">
    <img src="../assets/sonari-icon.svg" width="84" height="84" alt="Sonari app icon" />
    <div class="cap">App icon</div>
  </div>
  <div class="col">
    <img src="../assets/sonari-mark.svg" width="56" height="56" alt="Sonari mark" />
    <div class="cap">Mark</div>
  </div>
</div></body></html>
