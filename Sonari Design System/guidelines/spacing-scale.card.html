<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-bg); font-family: var(--font-sans); }
  .wrap { padding: 22px 24px; display: flex; gap: 14px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--accent-gradient); border-radius: 4px; width: 100%; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .n { font-size: 11px; color: var(--text-faint); font-weight: 700; }
</style></head>
<body><div class="wrap">
  <div class="item"><div class="bar" style="height:4px;width:4px;"></div><div class="v">4</div><div class="n">1</div></div>
  <div class="item"><div class="bar" style="height:8px;width:8px;"></div><div class="v">8</div><div class="n">2</div></div>
  <div class="item"><div class="bar" style="height:12px;width:12px;"></div><div class="v">12</div><div class="n">3</div></div>
  <div class="item"><div class="bar" style="height:16px;width:16px;"></div><div class="v">16</div><div class="n">4</div></div>
  <div class="item"><div class="bar" style="height:24px;width:24px;"></div><div class="v">24</div><div class="n">6</div></div>
  <div class="item"><div class="bar" style="height:32px;width:32px;"></div><div class="v">32</div><div class="n">8</div></div>
  <div class="item"><div class="bar" style="height:48px;width:48px;"></div><div class="v">48</div><div class="n">12</div></div>
  <div class="item"><div class="bar" style="height:64px;width:64px;"></div><div class="v">64</div><div class="n">16</div></div>
</div></body></html>
