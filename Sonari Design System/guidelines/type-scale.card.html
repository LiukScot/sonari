<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Manrope — display, title, heading, body, label, caption" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-bg); font-family: var(--font-sans); color: var(--text-strong); }
  .wrap { padding: 18px 24px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 130px; flex: 0 0 auto; }
</style></head>
<body><div class="wrap">
  <div class="row"><span class="meta">Display · 34/800</span><span style="font-size:var(--t-display);font-weight:800;letter-spacing:var(--track-tight);">The backdrop to your day</span></div>
  <div class="row"><span class="meta">Title · 24/700</span><span style="font-size:var(--t-title);font-weight:700;letter-spacing:var(--track-tight);">Build your mix</span></div>
  <div class="row"><span class="meta">Heading · 19/700</span><span style="font-size:var(--t-heading);font-weight:700;">Sleep timer</span></div>
  <div class="row"><span class="meta">Body · 16/400</span><span style="font-size:var(--t-body);font-weight:400;color:var(--text-body);">Rain, waves and a quiet café, looping softly.</span></div>
  <div class="row"><span class="meta">Label · 14/600</span><span style="font-size:var(--t-label);font-weight:600;">Coffee shop</span></div>
  <div class="row"><span class="meta">Caption · 12.5/500</span><span style="font-size:var(--t-caption);font-weight:500;color:var(--text-muted);">Plays with the screen off</span></div>
</div></body></html>
