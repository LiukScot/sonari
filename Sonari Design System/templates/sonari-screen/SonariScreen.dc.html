<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Sonari mixer screen" description="The Sonari home: sound grid, presets and the playback bar — built from the design-system components." -->
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
  <script src="./ds-base.js"></script>
  <script>
    (function () {
      // Re-draw lucide icons on a gentle interval. NOTE: never drive this
      // from a MutationObserver on the body — createIcons() mutates the DOM,
      // which would re-trigger the observer in an infinite loop and freeze
      // the tab.
      function draw(){ if (window.lucide) window.lucide.createIcons(); }
      window.addEventListener('DOMContentLoaded', draw);
      setInterval(draw, 700);
    })();
  </script>
</helmet>

<div style="min-height:100vh;background:radial-gradient(120% 120% at 50% 0%, #1a1622 0%, #0b0b0d 60%);display:flex;justify-content:center;align-items:flex-start;padding:32px 16px;font-family:var(--font-sans);">
  <div style="width:390px;background:var(--surface-app);border-radius:32px;overflow:hidden;border:1px solid var(--line-2);box-shadow:0 40px 90px rgba(0,0,0,0.55);">

    <!-- Top bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 18px 10px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <img src="../../assets/sonari-mark.svg" width="30" height="30" alt="" />
        <div>
          <div style="font-size:var(--t-heading);font-weight:800;color:var(--text-strong);letter-spacing:-0.02em;line-height:1;">Sonari</div>
          <div style="font-size:11px;color:var(--text-faint);margin-top:2px;">The backdrop to your day</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;color:var(--text-muted);">
        <i data-lucide="moon" style="width:20px;height:20px;"></i>
        <i data-lucide="settings" style="width:20px;height:20px;"></i>
      </div>
    </div>

    <!-- Preset chips -->
    <div style="display:flex;gap:8px;padding:6px 18px 12px;overflow-x:auto;">
      <span style="display:inline-flex;align-items:center;gap:7px;flex:0 0 auto;height:36px;padding:0 14px;border-radius:999px;background:var(--accent-016);color:var(--accent-solid);font-size:var(--t-caption);font-weight:600;"><i data-lucide="cloud-drizzle" style="width:15px;height:15px;"></i>afterRain</span>
      <span style="display:inline-flex;align-items:center;gap:7px;flex:0 0 auto;height:36px;padding:0 14px;border-radius:999px;background:var(--surface-card);border:1px solid var(--border-default);color:var(--text-muted);font-size:var(--t-caption);font-weight:600;"><i data-lucide="brain" style="width:15px;height:15px;"></i>Deep focus</span>
      <span style="display:inline-flex;align-items:center;gap:7px;flex:0 0 auto;height:36px;padding:0 14px;border-radius:999px;background:var(--surface-card);border:1px solid var(--border-default);color:var(--text-muted);font-size:var(--t-caption);font-weight:600;"><i data-lucide="moon" style="width:15px;height:15px;"></i>Night sleep</span>
    </div>

    <!-- Sound grid -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:4px 18px 18px;">
      <sc-for list="{{ sounds }}" as="s" hint-placeholder-count="9">
        <x-import component-from-global-scope="SonariDesignSystem_901849.SoundCard" name="{{ s.name }}" icon="{{ s.icon }}" volume="{{ s.volume }}" hint-size="100%,118px"></x-import>
      </sc-for>
    </div>

    <!-- Bottom playback bar -->
    <div style="padding:14px 18px 20px;background:var(--ink-1);border-top:1px solid var(--line-1);border-top-left-radius:24px;border-top-right-radius:24px;box-shadow:0 -8px 30px rgba(0,0,0,0.4);">
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:var(--t-caption);font-weight:600;color:var(--text-body);margin-bottom:8px;">3 sounds mixing</div>
          <x-import component-from-global-scope="SonariDesignSystem_901849.VolumeSlider" icon="volume-2" value="{{ master }}" label="{{ true }}" hint-size="100%,24px"></x-import>
        </div>
        <x-import component-from-global-scope="SonariDesignSystem_901849.PlayButton" playing="{{ playing }}" onClick="{{ togglePlay }}" hint-size="62px,62px"></x-import>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { playing: true, master: 72 };
  renderVals() {
    const sounds = [
      { name: 'Rain',        icon: 'cloud-rain',     volume: 64 },
      { name: 'Storm',       icon: 'cloud-lightning',volume: 0 },
      { name: 'Wind',        icon: 'wind',           volume: 0 },
      { name: 'Waves',       icon: 'waves',          volume: 38 },
      { name: 'Stream',      icon: 'droplet',        volume: 0 },
      { name: 'Birds',       icon: 'bird',           volume: 0 },
      { name: 'Coffee shop', icon: 'coffee',         volume: 52 },
      { name: 'Fireplace',   icon: 'flame',          volume: 0 },
      { name: 'White noise', icon: 'audio-waveform', volume: 0 },
    ];
    return {
      sounds,
      playing: this.state.playing,
      master: this.state.master,
      togglePlay: () => this.setState((s) => ({ playing: !s.playing })),
    };
  }
}
</script>
</body>
</html>
