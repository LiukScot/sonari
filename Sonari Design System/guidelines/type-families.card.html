<!-- @dsCard group="Type" viewport="700x170" name="Families & numerals" subtitle="Manrope for UI; JetBrains Mono for volumes, timers and tokens" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-bg); font-family: var(--font-sans); color: var(--text-strong); }
  .wrap { padding: 20px 24px; display: flex; gap: 44px; flex-wrap: wrap; }
  .lbl { font-size: var(--t-micro); letter-spacing: var(--track-caps); text-transform: uppercase; color: var(--text-faint); font-weight: 700; margin-bottom: 8px; }
  .weights { display: flex; gap: 14px; align-items: baseline; }
  .weights span { font-size: 22px; }
</style></head>
<body><div class="wrap">
  <div>
    <div class="lbl">Manrope · UI &amp; display</div>
    <div class="weights">
      <span style="font-weight:400;">Aa</span>
      <span style="font-weight:500;">Aa</span>
      <span style="font-weight:600;">Aa</span>
      <span style="font-weight:700;">Aa</span>
      <span style="font-weight:800;">Aa</span>
    </div>
    <div style="font-size:var(--t-caption);color:var(--text-muted);margin-top:8px;">400 · 500 · 600 · 700 · 800</div>
  </div>
  <div>
    <div class="lbl">JetBrains Mono · numerals</div>
    <div style="font-family:var(--font-mono);font-size:30px;font-weight:600;color:var(--accent-solid);">62 · 0:45 · 100%</div>
    <div style="font-size:var(--t-caption);color:var(--text-muted);margin-top:8px;">volumes · timers · tokens</div>
  </div>
</div></body></html>
