<!-- @dsCard group="Components" viewport="700x420" name="Sound tiles & Quick Tile" subtitle="The signature mixer tile and the Quick Settings tile" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--ink-bg); font-family: var(--font-sans); }
  #root { padding: 22px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .lbl { font-size: var(--t-micro); letter-spacing: var(--track-caps); text-transform: uppercase;
         color: var(--text-faint); font-weight: 700; margin: 0 0 12px; }
  .tiles { display: flex; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { SoundCard, QuickTile } = window.SonariDesignSystem_901849;
  function Demo() {
    const [mix, setMix] = React.useState({ rain: 72, waves: 40, coffee: 0, fire: 0 });
    const set = (k, v) => setMix((m) => ({ ...m, [k]: v }));
    React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
    return (
      <div>
        <p className="lbl">Sound tiles — active when volume &gt; 0</p>
        <div className="grid">
          <SoundCard name="Rain" icon="cloud-rain" volume={mix.rain}
            onToggle={() => set('rain', mix.rain ? 0 : 60)} onVolume={(v) => set('rain', v)} />
          <SoundCard name="Waves" icon="waves" volume={mix.waves}
            onToggle={() => set('waves', mix.waves ? 0 : 60)} onVolume={(v) => set('waves', v)} />
          <SoundCard name="Coffee shop" icon="coffee" volume={mix.coffee}
            onToggle={() => set('coffee', mix.coffee ? 0 : 55)} onVolume={(v) => set('coffee', v)} />
          <SoundCard name="Fireplace" icon="flame" volume={mix.fire}
            onToggle={() => set('fire', mix.fire ? 0 : 55)} onVolume={(v) => set('fire', v)} />
        </div>
        <p className="lbl">Quick Settings tiles — the differentiator</p>
        <div className="tiles">
          <QuickTile label="afterRain" sub="Playing" icon="cloud-drizzle" active />
          <QuickTile label="Deep focus" icon="brain" />
          <QuickTile label="Add preset" sub="Assign a tile" icon="plus" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
