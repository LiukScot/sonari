<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Rounded corners 8–24px, pill for play & sliders" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-bg); font-family: var(--font-sans); }
  .wrap { padding: 22px 24px; display: flex; gap: 18px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .box { width: 74px; height: 56px; background: var(--surface-card-grad);
         border: 1px solid var(--border-default); }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .n { font-size: 11px; color: var(--text-faint); font-weight: 700; }
</style></head>
<body><div class="wrap">
  <div class="item"><div class="box" style="border-radius:var(--r-xs)"></div><div class="n">xs</div><div class="v">8</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><div class="n">sm</div><div class="v">10</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><div class="n">md · card</div><div class="v">14</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><div class="n">lg</div><div class="v">18</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><div class="n">xl · bar</div><div class="v">24</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-pill);width:56px;"></div><div class="n">pill</div><div class="v">999</div></div>
</div></body></html>
