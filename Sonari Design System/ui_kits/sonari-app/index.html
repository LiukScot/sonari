<!-- @dsCard group="Sonari App" viewport="430x880" name="Sonari Android app" subtitle="Interactive mixer, presets, settings, and the Quick Settings shade" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sonari — UI Kit</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: radial-gradient(120% 120% at 50% 0%, #1a1622 0%, #0b0b0d 60%);
         font-family: var(--font-sans); display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  /* Android phone frame */
  .phone { position: relative; width: 390px; height: 844px; border-radius: 44px;
           background: #050507; padding: 6px; box-shadow: 0 40px 90px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05); }
  .screen { position: relative; width: 100%; height: 100%; border-radius: 38px; overflow: hidden;
            --surface-app: #0c0c0e; --ink-bg: #0c0c0e; background: var(--surface-app); }
  .statusbar { position: absolute; top: 0; left: 0; right: 0; height: 34px; z-index: 20;
               display: flex; align-items: center; justify-content: space-between; padding: 0 22px;
               font-size: 13px; font-weight: 600; color: var(--text-strong); pointer-events: none; }
  .statusbar .icons { display: flex; align-items: center; gap: 6px; }
  .content { position: absolute; top: 34px; left: 0; right: 0; bottom: 0; }
  .navbar { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-around;
            height: 62px; background: var(--ink-1); border-top: 1px solid var(--line-1); }
  .navbtn { display: flex; flex-direction: column; align-items: center; gap: 3px; border: none;
            background: none; cursor: pointer; font-family: var(--font-sans); font-size: 10.5px; font-weight: 600;
            padding: 6px 18px; -webkit-tap-highlight-color: transparent; }
  .shade-handle { position: absolute; top: 0; left: 0; right: 0; height: 34px; z-index: 21; cursor: pointer; }
</style>
</head>
<body>
<div class="phone"><div class="screen" id="screen"></div></div>

<script type="text/babel" src="MixerScreen.jsx"></script>
<script type="text/babel" src="PresetsScreen.jsx"></script>
<script type="text/babel" src="SettingsScreen.jsx"></script>
<script type="text/babel" src="ShadeScreen.jsx"></script>

<script type="text/babel" data-app>
const { IconButton, PlayButton, Button } = window.SonariDesignSystem_901849;

function StatusBar() {
  return (
    <div className="statusbar">
      <span>9:41</span>
      <span className="icons">
        <i data-lucide="signal" style={{ width: 15, height: 15 }} />
        <i data-lucide="wifi" style={{ width: 15, height: 15 }} />
        <i data-lucide="battery-full" style={{ width: 18, height: 18 }} />
      </span>
    </div>
  );
}

function NavBar({ tab, setTab }) {
  const items = [
    { id: 'mix', icon: 'sliders-horizontal', label: 'Mixer' },
    { id: 'presets', icon: 'layers', label: 'Presets' },
    { id: 'settings', icon: 'settings', label: 'Settings' },
  ];
  return (
    <div className="navbar">
      {items.map((it) => {
        const on = tab === it.id;
        return (
          <button key={it.id} className="navbtn" onClick={() => setTab(it.id)}
            style={{ color: on ? 'var(--accent-solid)' : 'var(--text-faint)' }}>
            <i data-lucide={it.icon} style={{ width: 22, height: 22 }} />
            {it.label}
          </button>
        );
      })}
    </div>
  );
}

function TimerSheet({ open, onClose, onPick, current }) {
  const opts = [
    { v: 0, label: 'Off' }, { v: 15, label: '15 min' }, { v: 30, label: '30 min' },
    { v: 45, label: '45 min' }, { v: 60, label: '1 hour' }, { v: 120, label: '2 hours' },
  ];
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 28, pointerEvents: open ? 'auto' : 'none' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(6,6,9,0.5)',
        opacity: open ? 1 : 0, transition: 'opacity var(--dur-base)' }} />
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, padding: '8px 18px 26px',
        background: 'var(--ink-1)', borderTopLeftRadius: 24, borderTopRightRadius: 24,
        borderTop: '1px solid var(--line-2)',
        transform: open ? 'translateY(0)' : 'translateY(102%)', transition: 'transform var(--dur-slow) var(--ease-soft)' }}>
        <div style={{ display: 'flex', justifyContent: 'center', padding: '8px 0 14px' }}>
          <div style={{ width: 36, height: 4, borderRadius: 2, background: 'var(--line-strong)' }} />
        </div>
        <div style={{ fontSize: 'var(--t-heading)', fontWeight: 700, color: 'var(--text-strong)', marginBottom: 4 }}>Sleep timer</div>
        <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 14 }}>Fade out and stop after…</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
          {opts.map((o) => {
            const on = current === o.v;
            return (
              <button key={o.v} onClick={() => onPick(o.v)} style={{
                height: 52, borderRadius: 'var(--r-md)', cursor: 'pointer',
                fontFamily: 'var(--font-sans)', fontSize: 'var(--t-label)', fontWeight: 600,
                border: `1px solid ${on ? 'transparent' : 'var(--border-default)'}`,
                background: on ? 'var(--accent-gradient)' : 'var(--surface-raised)',
                color: on ? 'var(--text-on-accent)' : 'var(--text-body)',
                boxShadow: on ? 'var(--glow-accent)' : 'none' }}>{o.label}</button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App() {
  const sounds = window.SONARI_SOUNDS;
  const [presets, setPresets] = React.useState(window.SONARI_PRESETS);
  const [mix, setMix] = React.useState({ rain: 64, waves: 38, coffee: 0, fire: 0 });
  const [playing, setPlaying] = React.useState(true);
  const [master, setMaster] = React.useState(72);
  const [tab, setTab] = React.useState('mix');
  const [fade, setFade] = React.useState(true);
  const [focusDuck, setFocusDuck] = React.useState(true);
  const [activePreset, setActivePreset] = React.useState(null);
  const [shadeOpen, setShadeOpen] = React.useState(false);
  const [timerOpen, setTimerOpen] = React.useState(false);
  const [timer, setTimer] = React.useState(0);
  const [playingPreset, setPlayingPreset] = React.useState(null);

  const setVol = (id, v) => { setMix((m) => ({ ...m, [id]: v })); setActivePreset(null); };

  const applyPreset = (id) => {
    const p = presets.find((x) => x.id === id);
    if (!p) return;
    const next = {}; sounds.forEach((s) => { next[s.id] = p.mix[s.id] || 0; });
    setMix(next); setActivePreset(id); setPlaying(true); setPlayingPreset(id);
  };
  const toggleTile = (id) => setPresets((ps) => ps.map((p) => p.id === id ? { ...p, tile: !p.tile } : p));

  const mixLabel = activePreset
    ? presets.find((p) => p.id === activePreset)?.name
    : `${Object.values(mix).filter((v) => v > 0).length} sounds`;
  const timerLabel = timer > 0 ? (timer >= 60 ? `${timer / 60}h left` : `${timer}m left`) : null;
  const tiles = presets.filter((p) => p.tile);

  React.useEffect(() => {
    window.lucide && window.lucide.createIcons();
  });

  let screen;
  if (tab === 'mix') screen = (
    <window.MixerScreen sounds={sounds} mix={mix} setVol={setVol}
      playing={playing} onPlayToggle={() => setPlaying(!playing)} master={master} setMaster={setMaster}
      presets={presets} activePreset={activePreset} onPreset={applyPreset}
      onOpenTimer={() => setTimerOpen(true)} onOpenSettings={() => setTab('settings')} timerLabel={timerLabel} />
  );
  else if (tab === 'presets') screen = (
    <window.PresetsScreen presets={presets} sounds={sounds}
      onPlay={(id) => { applyPreset(id); }} onToggleTile={toggleTile}
      playingId={playing ? playingPreset : null} />
  );
  else screen = (
    <window.SettingsScreen fade={fade} setFade={setFade}
      focusDuck={focusDuck} setFocusDuck={setFocusDuck} />
  );

  return (
    <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div className="shade-handle" onClick={() => setShadeOpen(true)} title="Pull down the shade" />
      <div className="content" style={{ display: 'flex', flexDirection: 'column' }}>
        <div style={{ flex: 1, minHeight: 0 }}>{screen}</div>
        <NavBar tab={tab} setTab={setTab} />
      </div>
      <TimerSheet open={timerOpen} onClose={() => setTimerOpen(false)} current={timer}
        onPick={(v) => { setTimer(v); setTimerOpen(false); }} />
      <window.ShadeScreen open={shadeOpen} onClose={() => setShadeOpen(false)}
        playing={playing} onPlayToggle={() => setPlaying(!playing)} mixLabel={mixLabel}
        tiles={tiles} mainActive={playing} onMainTile={() => setPlaying(!playing)} />
    </div>
  );
}

function boot() {
  if (!window.MixerScreen || !window.PresetsScreen || !window.SettingsScreen || !window.ShadeScreen
      || !window.SonariDesignSystem_901849) { setTimeout(boot, 40); return; }
  ReactDOM.createRoot(document.getElementById('screen')).render(<App />);
}
boot();
</script>
</body>
</html>
