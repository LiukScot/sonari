<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation & glow" subtitle="Soft dark shadows; accent glow only on active card & play" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-bg); font-family: var(--font-sans); }
  .wrap { padding: 28px 24px; display: flex; gap: 26px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 64px; border-radius: var(--r-md); background: var(--ink-2);
         border: 1px solid var(--line-1); }
  .n { font-size: 11px; color: var(--text-faint); font-weight: 700; }
</style></head>
<body><div class="wrap">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">shadow-md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">shadow-lg</div></div>
  <div class="item"><div class="box" style="background:var(--accent-gradient);box-shadow:var(--glow-accent)"></div><div class="n">glow-accent</div></div>
  <div class="item"><div class="box" style="background:var(--pink);box-shadow:var(--glow-pink)"></div><div class="n">glow-pink</div></div>
</div></body></html>
