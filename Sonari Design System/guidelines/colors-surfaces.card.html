<!-- @dsCard group="Colors" viewport="700x200" name="Dark surfaces" subtitle="Layered dark — the default 'twilight' theme" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-base); font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 22px 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { border-radius: var(--r-sm); padding: 12px; width: 120px; height: 96px;
        display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--line-2); }
  .name { font-size: var(--t-caption); font-weight: 700; color: var(--text-strong); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style></head>
<body><div class="wrap">
  <div class="sw" style="background: var(--ink-base);"><div class="name">Base</div><div class="val">#0e0e10</div></div>
  <div class="sw" style="background: var(--ink-bg);"><div class="name">Background</div><div class="val">#121214</div></div>
  <div class="sw" style="background: var(--ink-1);"><div class="name">Card</div><div class="val">#161619</div></div>
  <div class="sw" style="background: var(--ink-2);"><div class="name">Raised</div><div class="val">#1b1b1f</div></div>
  <div class="sw" style="background: var(--ink-3);"><div class="name">Hover</div><div class="val">#1e1e22</div></div>
  <div class="sw" style="background: var(--ink-4);"><div class="name">Pressed</div><div class="val">#26262b</div></div>
</div></body></html>
